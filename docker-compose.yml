services:
  db:
    image: postgres:15
    container_name: jahanpars_db
    restart: always
    environment:
      POSTGRES_DB: jahanpars_db
      POSTGRES_USER: jahanpars
      POSTGRES_PASSWORD: secret
    ports:
      - "54321:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: jahanpars_redis
    restart: always
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: jahanpars_minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"

volumes:
  pgdata:
  miniodata:
